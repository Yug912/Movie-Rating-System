<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Rating System</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #18202f;
        background: #f5f7fb;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #dbe2ee;
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(24, 32, 47, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: #516074;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      code {
        padding: 3px 6px;
        border-radius: 4px;
        background: #eef2f7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Movie Rating System</h1>
      <p>
        The MERN project has been scaffolded in <code>client/</code> and <code>server/</code>.
        Run <code>npm run install:all</code>, then start <code>npm run dev:server</code> and
        <code>npm run dev:client</code> in separate terminals.
      </p>
      <p>
        Frontend: <code>http://localhost:5173</code><br />
        Backend: <code>http://localhost:5001</code>
      </p>
    </main>
  </body>
</html>
